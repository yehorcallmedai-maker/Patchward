[repomend]
# Path to the repository to scan (override with --repo flag)
repo_path = "D:/Dev/Projects/RepoMend"

# Semgrep ruleset to apply
semgrep_rules = "p/python"

# SQLite state store path (relative to project root)
db_path = "runs/state.db"

# Langfuse OTel tracing (cloud free tier)
# Set LANGFUSE_PUBLIC_KEY and LANGFUSE_SECRET_KEY as environment variables
langfuse_host = "https://cloud.langfuse.com"
tracing_enabled = true

[github]
owner = "yehorcallmedai-maker"
repo = "RepoMend"
base_branch = "main"

[batch]
# Maximum number of repos processed concurrently (asyncio.Semaphore).
# Default 3 is conservative for Anthropic Tier 1 rate limits
# (~40k TPM for Sonnet; 3 concurrent Fix-Gen calls ≈ 12k TPM).
# Raise to 5–10 on Tier 2+. (C-P6-02, C-P6-10)
max_concurrent = 3

[models]
# scanner_model: used for Semgrep triage and Gate 1 (fast/cheap).
# fix_model: used for Fix-Gen and Gate 2/3 semantic reasoning.
# Override fix_model per-run with: repomend fix --model <string>
# (C-P6-05, ADR-021)
scanner_model = "claude-haiku-4-5-20251001"
fix_model     = "claude-sonnet-4-6"

# Multi-repo batch processing (ADR-022).
# Add one [[repos]] entry per repository. Per-entry fields override
# [github] defaults field-by-field. Only 'path' is required if
# [github].owner and [github].repo are set.
#
# [[repos]]
# path        = "C:/Dev/Projects/repo-alpha"
# owner       = "acme"          # optional if set in [github]
# repo        = "repo-alpha"
# base_branch = "main"          # optional — defaults to [github].base_branch
#
# [[repos]]
# path        = "C:/Dev/Projects/repo-beta"
# repo        = "repo-beta"     # inherits owner from [github]
# base_branch = "develop"
